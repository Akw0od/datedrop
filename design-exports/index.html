<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],

      },

<style>
  html, body { margin: 0; padding: 0; background: #e7e7ea; -webkit-font-smoothing: antialiased; }
  * { -webkit-tap-highlight-color: transparent; }
  .font-mono { font-feature-settings: "tnum" 1; }

  /* ---- spring entrance ---- */
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(16px) scale(.975); }
    to   { opacity: 1; transform: none; }
  }
  .drop { animation: dropIn .56s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  @keyframes sheetUp {
    from { transform: translateY(101%); }
    to   { transform: translateY(0); }
  }
  .sheet-in { animation: sheetUp .44s cubic-bezier(0.32, 1.42, 0.55, 1) both; }

  @keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }
  .scrim-in { animation: scrimIn .3s ease both; }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .35; transform: scale(.82); }
  }
  .pulse-dot { animation: pulseDot 1.5s ease-in-out infinite; }

  @keyframes sealPop {
    0% { opacity: 0; transform: scale(.4) rotate(-12deg); }
    60% { opacity: 1; transform: scale(1.12) rotate(3deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .seal-pop { animation: sealPop .6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  @media (prefers-reduced-motion: reduce) {
    .drop, .sheet-in, .scrim-in, .pulse-dot, .seal-pop { animation: none !important; }
  }

  /* hide scrollbars on the phone surfaces */
  .no-sb::-webkit-scrollbar { display: none; }
  .no-sb { -ms-overflow-style: none; scrollbar-width: none; }

  /* ============================================================ *
   *  THEMES  ·  zinc base + a single restrained accent each
   * ============================================================ */
  [data-theme="rose"] {
    --bg:#fafafa; --card:#ffffff; --subtle:#f4f4f5; --chip:#f4f4f5; --hair:#e4e4e7;
    --border:rgba(228,228,231,.7);
    --ink:#18181b; --ink-text:#ffffff; --dim-bg:#e4e4e7; --dim-text:#a1a1aa;
    --text:#18181b; --text2:#3f3f46; --text3:#71717a; --muted:#a1a1aa; --faint:#d4d4d8;
    --accent:#e11d48; --accent-soft:#fff1f2; --accent-border:#fecdd3; --accent-strong:#be123c; --accent-shadow:rgba(225,29,72,.5);
    --bar:rgba(255,255,255,.85); --scrim:rgba(24,24,27,.3);
    --warn-bg:#fffbeb; --warn-border:#fde68a; --warn-title:#78350f; --warn-body:#92400e; --warn-icon:#d97706;
  }
  [data-theme="sand"] {
    --bg:#faf7f2; --card:#fffdfb; --subtle:#f4efe8; --chip:#f2ece2; --hair:#e7dfd2;
    --border:rgba(231,223,210,.8);
    --ink:#292524; --ink-text:#ffffff; --dim-bg:#e7dfd2; --dim-text:#a8a29e;
    --text:#292524; --text2:#57534e; --text3:#78716c; --muted:#a8a29e; --faint:#d6cdbf;
    --accent:#c2410c; --accent-soft:#fff5ed; --accent-border:#fcd9b6; --accent-strong:#9a3412; --accent-shadow:rgba(194,65,12,.4);
    --bar:rgba(255,253,251,.85); --scrim:rgba(41,37,36,.3);
    --warn-bg:#fdf6ec; --warn-border:#f0d9a8; --warn-title:#854d0e; --warn-body:#a16207; --warn-icon:#ca8a04;
  }
  [data-theme="sage"] {
    --bg:#f6f8f6; --card:#ffffff; --subtle:#eef3ef; --chip:#e9f0ea; --hair:#dbe5dd;
    --border:rgba(214,226,217,.85);
    --ink:#1b251f; --ink-text:#ffffff; --dim-bg:#dbe5dd; --dim-text:#94a399;
    --text:#16201a; --text2:#3f4d45; --text3:#62716a; --muted:#94a399; --faint:#c4d2c8;
    --accent:#047857; --accent-soft:#ecfdf3; --accent-border:#a7f3cf; --accent-strong:#065f46; --accent-shadow:rgba(4,120,87,.38);
    --bar:rgba(255,255,255,.85); --scrim:rgba(22,32,26,.3);
    --warn-bg:#fdf6ec; --warn-border:#ecdaa8; --warn-title:#7c5e10; --warn-body:#92740f; --warn-icon:#c98a04;
  }
  [data-theme="midnight"] {
    --bg:#0e0e11; --card:#1a1a20; --subtle:#222229; --chip:#2a2a32; --hair:#33333c;
    --border:rgba(255,255,255,.09);
    --ink:#fafafa; --ink-text:#18181b; --dim-bg:#2a2a32; --dim-text:#6b6b75;
    --text:#fafafa; --text2:#d4d4d8; --text3:#a1a1aa; --muted:#71717a; --faint:#52525b;
    --accent:#f43f5e; --accent-soft:rgba(244,63,94,.14); --accent-border:rgba(244,63,94,.34); --accent-strong:#fb7185; --accent-shadow:rgba(244,63,94,.42);
    --bar:rgba(26,26,32,.85); --scrim:rgba(0,0,0,.55);
    --warn-bg:rgba(217,119,6,.13); --warn-border:rgba(217,119,6,.34); --warn-title:#fcd34d; --warn-body:rgba(252,211,77,.72); --warn-icon:#fbbf24;
  }

  /* semantic helpers driven by the vars above */
  .t-bg{background:var(--bg)} .t-card{background:var(--card)} .t-subtle{background:var(--subtle)}
  .t-chip{background:var(--chip)} .t-hair-bg{background:var(--hair)}
  .t-ink{background:var(--ink);color:var(--ink-text)} .t-dim{background:var(--dim-bg);color:var(--dim-text)}
  .t-text{color:var(--text)} .t-text2{color:var(--text2)} .t-text3{color:var(--text3)}
  .t-muted{color:var(--muted)} .t-faint{color:var(--faint)}
  .t-border{border-color:var(--border)}
  .t-accent-bg{background:var(--accent);color:#fff} .t-accent-text{color:var(--accent)}
  .t-accent-bd{border-color:var(--accent)} .t-accent-soft{background:var(--accent-soft)}
  .t-accent-soft-bd{border-color:var(--accent-border)} .t-accent-strong{color:var(--accent-strong)}
  .t-bar{background:var(--bar)} .t-scrim{background:var(--scrim)}
  .t-warn{background:var(--warn-bg)} .t-warn-bd{border-color:var(--warn-border)}
  .t-warn-title{color:var(--warn-title)} .t-warn-body{color:var(--warn-body)}
  .swap-hover:hover{border-color:var(--accent-border);color:var(--accent)}

  /* smooth cross-fade when switching themes */
  .theme-anim, .theme-anim * {
    transition: background-color .45s ease, border-color .45s ease, color .3s ease, box-shadow .45s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .theme-anim, .theme-anim * { transition: none; }
  }

  .snap-x { scroll-snap-type: x mandatory; }
  .snap-c { scroll-snap-align: center; }

  .press { transition: transform .12s cubic-bezier(0.34,1.56,0.64,1); }
  .press:active { transform: scale(.955); }
</style>
