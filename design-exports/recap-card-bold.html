<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DateDrop · 约会周报分享卡（黑体版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root {
    --bg:#fafafa; --card:#ffffff; --subtle:#f4f4f5; --chip:#f4f4f5;
    --border:rgba(228,228,231,0.7); --hair:#e4e4e7;
    --ink:#18181b; --t2:#3f3f46; --t3:#71717a; --muted:#a1a1aa; --faint:#d4d4d8;
    --accent:#e11d48; --accent-soft:#fff1f2; --accent-border:#fecdd3;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #e7e7ea;
    font-family: "Geist", "Noto Sans SC", system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "Geist Mono", monospace; font-feature-settings:"tnum" 1; }
  .cn { font-family: "Noto Sans SC", "Geist", sans-serif; }

  /* ---------- presentation chrome ---------- */
  .studio { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:36px 24px 70px; }
  .studio-head { text-align:center; margin-bottom:28px; }
  .studio-head h1 { font-size:24px; font-weight:600; letter-spacing:-0.02em; color:#3f3f46; margin:0; }
  .studio-head p { font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#a1a1aa; margin:8px 0 0; }
  .gallery { display:flex; gap:64px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }
  .frame-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .frame-label { font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#9a8c77; color:#a1a1aa; display:inline-flex; align-items:center; gap:8px; }
  .frame-label b { color:#52525b; font-weight:600; }

  .phone { position:relative; background:#18181b; border-radius:54px; padding:11px; box-shadow:0 50px 90px -36px rgba(20,20,25,0.5), 0 0 0 1px rgba(0,0,0,0.5); }
  .phone .screen { position:relative; overflow:hidden; border-radius:44px; }
  .phone .island { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:92px; height:24px; background:#000; border-radius:99px; z-index:60; }
  .mat { border-radius:14px; overflow:hidden; box-shadow:0 44px 80px -34px rgba(20,20,25,0.45), 0 0 0 1px rgba(0,0,0,0.05); }
  .fit { position:relative; }

  /* ---------- card ---------- */
  .card { position:relative; overflow:hidden; background:var(--bg); color:var(--ink); }
  .seclabel { font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
  .pill-week { display:inline-flex; align-items:center; gap:7px; background:var(--accent); color:#fff; border-radius:99px; font-weight:600; }
  .avatar { display:inline-flex; align-items:center; justify-content:center; border-radius:99px; background:var(--ink); color:#fff; font-weight:500; box-shadow:0 0 0 3px var(--bg); }

  .photo { position:relative; overflow:hidden; border-radius:22px; background:#e4e4e7; box-shadow:0 18px 36px -20px rgba(0,0,0,0.22); }
  .photo::after { content:""; position:absolute; inset:0; border-radius:22px; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06); pointer-events:none; }
  .photo img { width:100%; height:100%; object-fit:cover; display:block; }
  .cap { position:absolute; left:12px; bottom:12px; display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.92); backdrop-filter:blur(6px); border-radius:99px; padding:5px 11px; font-family:"Noto Sans SC",sans-serif; font-weight:500; color:var(--t2); box-shadow:0 4px 10px -4px rgba(0,0,0,0.2); }
  .cap .d { width:6px; height:6px; border-radius:99px; background:var(--accent); }

  .metacard { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:30px; overflow:hidden; box-shadow:0 20px 40px -15px rgba(0,0,0,0.06); }
  .metacell { display:flex; align-items:center; gap:14px; background:var(--card); }

  .panel { background:var(--card); border:1px solid var(--border); border-radius:30px; box-shadow:0 20px 40px -15px rgba(0,0,0,0.06); }
  .madewith { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-family:"Geist Mono",monospace; letter-spacing:0.1em; }
  .logomark { display:inline-flex; align-items:center; justify-content:center; border-radius:7px; background:var(--accent); }
  .ph { line-height:1; }
</style>
</head>
<body>
<div class="studio">
  <div class="studio-head">
    <h1>约会周报 · 分享卡</h1>
    <p>DateDrop · 黑体版 / clean</p>
  </div>
  <div class="gallery" id="gallery"></div>
</div>

<script>
const CARD = {
  week: "第 12 周",
  dateText: "6.13 周六 · 旧金山",
  me: { name: "阿傲", initial: "傲" },
  partner: { name: "小白", initial: "白" },
  hero: [["海风、小白球，", false], ["和一场迟来的", false], ["日落晚餐", true]],
  photos: [
    { seed: "datedrop-putt-92",  cap: "先赢一局" },
    { seed: "datedrop-baker-41", cap: "8:21 的光" },
    { seed: "datedrop-ferry-77", cap: "靠窗那桌" },
  ],
  stops: [
    { v: "Urban Putt", a: "Mission" },
    { v: "Baker Beach", a: "Presidio" },
    { v: "Ferry Building", a: "Embarcadero" },
  ],
  stats: [
    { icon: "ph-path",   n: "5.2", u: "km", l: "一起走了" },
    { icon: "ph-sun",    n: "1",   u: "次", l: "看了日落" },
    { icon: "ph-camera", n: "23",  u: "张", l: "拍了照片" },
    { icon: "ph-wallet", n: "74",  u: "",  l: "这周花了", money: true },
  ],
  note: "小白第一杆就进了洞，愿赌服输，晚饭她请。日落那阵风大得站不稳——你说，值。",
  signer: "阿傲",
};

function ph(name, size, color) {
  return `<i class="ph ${name}" style="font-size:${size}px;${color?`color:${color}`:''}"></i>`;
}

function avatars(s) {
  return `<span style="display:inline-flex">
    <span class="avatar" style="width:${s}px;height:${s}px;font-size:${s*0.42}px">${CARD.me.initial}</span>
    <span class="avatar" style="width:${s}px;height:${s}px;font-size:${s*0.42}px;margin-left:-${s*0.32}px;background:var(--accent)">${CARD.partner.initial}</span>
  </span>`;
}

function photoGrid(k, h, capFs) {
  const p = CARD.photos;
  const tile = (i, extra) => `<div class="photo" style="${extra}">
      <img src="https://picsum.photos/seed/${p[i].seed}/700/800" alt="" />
      <span class="cap" style="font-size:${capFs}px"><span class="d"></span>${p[i].cap}</span>
    </div>`;
  return `<div style="display:grid;grid-template-columns:1.18fr 1fr;grid-template-rows:1fr 1fr;gap:${k}px;height:${h}px">
    ${tile(0, "grid-row:span 2")}
    ${tile(1, "")}
    ${tile(2, "")}
  </div>`;
}

function footprint(W, big) {
  const n = CARD.stops.length;
  const pad = big ? 26 : 18;
  const span = (W - pad * 2) / (n - 1);
  const y = big ? 17 : 15;
  let line = `<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--accent)" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.65"/>`;
  let dots = "";
  CARD.stops.forEach((s, i) => {
    const x = pad + span * i;
    dots += `<circle cx="${x}" cy="${y}" r="${big?7:6}" fill="var(--card)" stroke="var(--accent)" stroke-width="2.5"/><circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent)"/>`;
  });
  let labels = `<div style="display:flex;justify-content:space-between;margin-top:${big?12:9}px;padding:0 ${pad-(big?22:16)}px">`;
  CARD.stops.forEach((s, i) => {
    const al = i===0?"flex-start":i===n-1?"flex-end":"center";
    const ta = i===0?"left":i===n-1?"right":"center";
    labels += `<div style="display:flex;flex-direction:column;align-items:${al};text-align:${ta}">
      <span style="font-weight:600;letter-spacing:-0.01em;white-space:nowrap;font-size:${big?22:17}px;color:var(--ink)">${s.v}</span>
      <span class="cn" style="font-size:${big?13:11}px;color:var(--muted);margin-top:2px">${s.a}</span>
    </div>`;
  });
  labels += `</div>`;
  return `<svg width="${W}" height="${y*2}" viewBox="0 0 ${W} ${y*2}" style="display:block;width:100%">${line}${dots}</svg>${labels}`;
}

function statGrid(big) {
  const pad = big ? "22px 24px" : "16px 18px";
  const nFs = big ? 30 : 24, uFs = big ? 15 : 13, lFs = big ? 14 : 12, iFs = big ? 22 : 18;
  return `<div class="metacard">
    ${CARD.stats.map(s => `<div class="metacell" style="padding:${pad}">
      ${ph(s.icon, iFs, "var(--t3)")}
      <div style="line-height:1.1">
        <div style="display:flex;align-items:baseline;gap:3px">
          <span class="mono" style="font-size:${nFs}px;font-weight:600;color:var(--ink)">${s.money?'$':''}${s.n}</span>
          <span class="mono" style="font-size:${uFs}px;color:var(--t3)">${s.u}</span>
        </div>
        <div class="cn" style="font-size:${lFs}px;color:var(--muted);margin-top:4px">${s.l}</div>
      </div>
    </div>`).join("")}
  </div>`;
}

const FMT = {
  story:   { W:1080, H:1920, padX:80, padTop:64, padBot:56, gap:38, hero:62, gridH:760, gridGap:16, capFs:14, ava:46, noteFs:22 },
  rednote: { W:1080, H:1350, padX:72, padTop:48, padBot:42, gap:20, hero:50, gridH:430, gridGap:12, capFs:13, ava:40, noteFs:19 },
};

function buildCard(format) {
  const f = FMT[format];
  const big = format === "story";
  const cw = f.W - f.padX * 2;
  return `
  <div class="card" style="width:${f.W}px;height:${f.H}px;padding:${f.padTop}px ${f.padX}px ${f.padBot}px;display:flex;flex-direction:column">
    <!-- top row -->
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span class="seclabel" style="font-size:${big?13:12}px">DATEDROP</span>
      <span class="pill-week" style="padding:${big?'7px 14px':'6px 12px'};font-size:${big?14:13}px">
        ${ph("ph-check-circle ph-fill", big?15:14)} ${CARD.week} · 已完成
      </span>
    </div>

    <!-- couple + date -->
    <div style="display:flex;align-items:center;gap:14px;margin-top:${f.gap}px">
      ${avatars(f.ava)}
      <div style="line-height:1.15">
        <div style="font-size:${big?26:22}px;font-weight:600;letter-spacing:-0.02em">${CARD.me.name} <span style="color:var(--faint);font-weight:400">&</span> ${CARD.partner.name}</div>
        <div class="mono" style="font-size:${big?13:12}px;color:var(--t3);margin-top:4px;letter-spacing:0.02em">${CARD.dateText}</div>
      </div>
    </div>

    <!-- hero -->
    <h1 style="margin:${big?34:22}px 0 0;font-size:${f.hero}px;font-weight:600;letter-spacing:-0.03em;line-height:1.16">
      ${CARD.hero.map(([t,acc])=>`<div${acc?' style="color:var(--accent)"':''}>${t}</div>`).join("")}
    </h1>

    <!-- photos -->
    <div style="margin-top:${big?34:20}px">${photoGrid(f.gridGap, f.gridH, f.capFs)}</div>

    <!-- footprint -->
    <div style="margin-top:${big?32:18}px">
      <div class="seclabel" style="font-size:11px;margin-bottom:${big?14:10}px">这周的足迹</div>
      ${footprint(cw, big)}
    </div>

    <!-- stats -->
    <div style="margin-top:${big?28:16}px">${statGrid(big)}</div>

    <!-- note -->
    <div class="panel" style="margin-top:${big?22:14}px;padding:${big?'24px 26px':'18px 22px'};position:relative">
      ${ph("ph-quotes ph-fill", big?22:18, "var(--accent-border)")}
      <p class="cn" style="margin:${big?10:6}px 0 0;font-size:${f.noteFs}px;line-height:1.6;color:var(--t2)">${CARD.note}</p>
      <div style="display:flex;justify-content:flex-end;margin-top:${big?12:8}px">
        <span class="cn" style="font-size:${big?15:13}px;font-weight:500;color:var(--t3)">— ${CARD.signer}</span>
      </div>
    </div>

    <!-- footer -->
    <div style="margin-top:auto;padding-top:${big?24:14}px;display:flex;justify-content:center">
      <span class="madewith" style="font-size:${big?13:12}px">
        <span class="logomark" style="width:${big?20:18}px;height:${big?20:18}px">${ph("ph-heart ph-fill", big?12:11, "#fff")}</span>
        made with DateDrop
      </span>
    </div>
  </div>`;
}

/* ---- mount + scale ---- */
const STORY_W = 1080 + 22, STORY_H = 1920 + 22, RED_W = 1080, RED_H = 1350;
function render() {
  document.getElementById("gallery").innerHTML = `
    <div class="frame-wrap">
      <div class="frame-label"><b>9:16</b> · Story / 抖音 · 1080×1920</div>
      <div class="fit" id="fit-story"><div class="phone" id="ph-story"><div class="island"></div><div class="screen">${buildCard("story")}</div></div></div>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><b>4:5</b> · 小红书 · 1080×1350</div>
      <div class="fit" id="fit-red"><div class="mat" id="ph-red">${buildCard("rednote")}</div></div>
    </div>`;
  scale();
}
function scale() {
  const availH = window.innerHeight - 190, availW = window.innerWidth - 48;
  const s = Math.max(0.18, Math.min(0.5, (availW - 64) / (STORY_W + RED_W), availH / STORY_H));
  applyFit("fit-story", "ph-story", STORY_W, STORY_H, s);
  applyFit("fit-red", "ph-red", RED_W, RED_H, s);
}
function applyFit(fitId, elId, w, h, s) {
  const fit = document.getElementById(fitId), el = document.getElementById(elId);
  fit.style.width = (w*s)+"px"; fit.style.height = (h*s)+"px";
  el.style.width = w+"px"; el.style.transform = `scale(${s})`; el.style.transformOrigin = "top left";
}
window.addEventListener("resize", scale);
window.addEventListener("load", scale);
render();
</script>
